<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/sidebar.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <div class="page-loading" id="loading-overlay">
    <div class="spinner"></div>
    <p>Loading…</p>
  </div>

  <div class="app-layout" id="app-content" style="display:none">
    <div id="sidebar-container"></div>
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content">
      <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <h1>Analytics</h1>
          <p>Sales performance and insights</p>
        </div>
        <button id="btn-export-csv" class="btn btn-outline">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
      </div>

      <!-- Period Selector -->
      <div class="period-selector">
        <button class="period-btn active" data-period="7d">Last 7 Days</button>
        <button class="period-btn"        data-period="30d">Last 30 Days</button>
        <button class="period-btn"        data-period="3m">Last 3 Months</button>
      </div>

      <!-- Summary Cards -->
      <div class="summary-cards">
        <div class="stat-card">
          <div class="stat-icon green">💰</div>
          <div class="stat-info">
            <div class="stat-label">Total Revenue</div>
            <div class="stat-value" id="sum-revenue">…</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue">📋</div>
          <div class="stat-info">
            <div class="stat-label">Total Orders</div>
            <div class="stat-value" id="sum-orders">…</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon yellow">📊</div>
          <div class="stat-info">
            <div class="stat-label">Avg Order Value</div>
            <div class="stat-value" id="sum-avg">…</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">🏆</div>
          <div class="stat-info">
            <div class="stat-label">Top Category</div>
            <div class="stat-value" id="sum-top-cat" style="font-size:16px">…</div>
          </div>
        </div>
      </div>

      <!-- Charts -->
      <div class="analytics-grid">
        <div class="chart-card">
          <h3>Daily Revenue (₪)</h3>
          <canvas id="revenue-line-chart" height="130"></canvas>
        </div>
        <div class="chart-card">
          <h3>Top 10 Best-Selling Medicines</h3>
          <canvas id="top-meds-chart"></canvas>
        </div>
      </div>

      <!-- Data Table -->
      <div class="card">
        <div class="section-header">
          <h2>Daily Breakdown</h2>
          <span class="text-muted" style="font-size:13px">Showing selected period</span>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Orders</th>
                <th>Revenue (₪)</th>
              </tr>
            </thead>
            <tbody id="analytics-tbody">
              <tr><td colspan="3"><div class="loading-state"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/analytics.js"></script>
  <script>
    initAuthGuard(function () {
      renderSidebar();
      initAnalytics();
    });
  </script>
</body>
</html>
