<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/sidebar.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <div class="page-loading" id="loading-overlay">
    <div class="spinner"></div>
    <p>Loading PharmacyLink…</p>
  </div>

  <div class="app-layout" id="app-content" style="display:none">
    <div id="sidebar-container"></div>
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content">
      <div class="page-header">
        <h1>Dashboard</h1>
        <p id="dashboard-date"></p>
      </div>

      <!-- ── Stats ── -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon green">💰</div>
          <div class="stat-info">
            <div class="stat-label">Today's Revenue</div>
            <div class="stat-value" id="stat-revenue">—</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue">📦</div>
          <div class="stat-info">
            <div class="stat-label">Orders Today</div>
            <div class="stat-value" id="stat-orders">—</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon yellow">⚠️</div>
          <div class="stat-info">
            <div class="stat-label">Low Stock Alerts</div>
            <div class="stat-value" id="stat-low-stock">—</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">💊</div>
          <div class="stat-info">
            <div class="stat-label">Active Products</div>
            <div class="stat-value" id="stat-products">—</div>
          </div>
        </div>
      </div>

      <!-- ── Charts ── -->
      <div class="charts-row">
        <div class="chart-card">
          <h3>Weekly Revenue (₪)</h3>
          <canvas id="revenue-chart"></canvas>
        </div>
        <div class="chart-card">
          <h3>Sales by Category</h3>
          <canvas id="category-chart"></canvas>
        </div>
      </div>

      <!-- ── Bottom Row ── -->
      <div class="two-col-bottom">
        <!-- Recent Orders -->
        <div class="card">
          <div class="section-header">
            <h2>Recent Orders</h2>
            <a href="orders.html" class="btn btn-sm btn-outline">View All →</a>
          </div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Order #</th>
                  <th>Customer</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Time</th>
                </tr>
              </thead>
              <tbody id="recent-orders-tbody">
                <tr><td colspan="5"><div class="loading-state"><div class="spinner"></div></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Low Stock Alerts -->
        <div class="card">
          <div class="section-header">
            <h2>Low Stock Alerts</h2>
            <a href="inventory.html" class="btn btn-sm btn-outline">Manage →</a>
          </div>
          <ul class="alert-list" id="low-stock-list">
            <li><div class="loading-state"><div class="spinner spinner-sm" style="margin:auto"></div></div></li>
          </ul>
        </div>
      </div>
    </main>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    initAuthGuard(function () {
      renderSidebar();
      initDashboard();
    });
  </script>
</body>
</html>
