<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/sidebar.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <div class="page-loading" id="loading-overlay">
    <div class="spinner"></div>
    <p>Loading…</p>
  </div>

  <div class="app-layout" id="app-content" style="display:none">
    <div id="sidebar-container"></div>
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content">
      <div class="page-header">
        <h1>Inventory</h1>
        <p>Manage your pharmacy products and stock levels</p>
      </div>

      <div class="card">
        <!-- Toolbar -->
        <div class="table-toolbar">
          <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="inv-search" class="form-control" placeholder="Search by name or category…">
          </div>
          <select id="inv-category" class="form-control" style="max-width:180px">
            <option value="">All Categories</option>
            <option value="Antibiotics">Antibiotics</option>
            <option value="Pain Relief">Pain Relief</option>
            <option value="Vitamins">Vitamins</option>
            <option value="Chronic">Chronic</option>
            <option value="Other">Other</option>
          </select>
          <button id="btn-add-product" class="btn btn-primary">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Product
          </button>
        </div>

        <!-- Table -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Arabic Name</th>
                <th>English Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Expiry Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="inv-tbody">
              <tr><td colspan="9"><div class="loading-state"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="pagination">
          <span class="pagination-info" id="page-info">Loading…</span>
          <div class="pagination-controls">
            <button id="btn-prev" class="btn btn-sm btn-ghost" disabled>← Prev</button>
            <button id="btn-next" class="btn btn-sm btn-ghost" disabled>Next →</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- ── Add / Edit Product Modal ── -->
  <div class="modal-overlay" id="product-modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Add New Product</h3>
        <button class="modal-close" id="modal-close-btn" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <form id="product-form" novalidate>
          <div class="form-grid">
            <div class="form-group">
              <label for="f-nameAr">Arabic Name <span style="color:var(--danger)">*</span></label>
              <input type="text" id="f-nameAr" class="form-control" placeholder="الاسم بالعربي" dir="rtl">
            </div>
            <div class="form-group">
              <label for="f-nameEn">English Name <span style="color:var(--danger)">*</span></label>
              <input type="text" id="f-nameEn" class="form-control" placeholder="e.g. Amoxicillin">
            </div>
          </div>

          <div class="form-group">
            <label for="f-category">Category <span style="color:var(--danger)">*</span></label>
            <select id="f-category" class="form-control">
              <option value="">Select category…</option>
              <option value="Antibiotics">Antibiotics</option>
              <option value="Pain Relief">Pain Relief</option>
              <option value="Vitamins">Vitamins</option>
              <option value="Chronic">Chronic</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="f-price">Price (₪) <span style="color:var(--danger)">*</span></label>
              <input type="number" id="f-price" class="form-control" placeholder="0.00" min="0" step="0.01">
            </div>
            <div class="form-group">
              <label for="f-expiry">Expiry Date</label>
              <input type="date" id="f-expiry" class="form-control">
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="f-stock">Current Stock <span style="color:var(--danger)">*</span></label>
              <input type="number" id="f-stock" class="form-control" placeholder="0" min="0" step="1">
            </div>
            <div class="form-group">
              <label for="f-minStock">Min Stock Level <span style="color:var(--danger)">*</span></label>
              <input type="number" id="f-minStock" class="form-control" placeholder="10" min="1" step="1">
            </div>
          </div>

          <div class="form-group">
            <label for="f-desc">Description</label>
            <textarea id="f-desc" class="form-control" placeholder="Optional product description…"></textarea>
          </div>

          <p id="modal-msg"></p>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel-btn">Cancel</button>
        <button class="btn btn-primary" id="modal-save-btn" type="button" onclick="saveProduct(event)">Add Product</button>
      </div>
    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/inventory.js"></script>
  <script>
    initAuthGuard(function () {
      renderSidebar();
      initInventory();
    });
  </script>
</body>
</html>
