<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/sidebar.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <div class="page-loading" id="loading-overlay">
    <div class="spinner"></div>
    <p>Loading…</p>
  </div>

  <div class="app-layout" id="app-content" style="display:none">
    <div id="sidebar-container"></div>
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content">
      <div class="page-header">
        <h1>Orders</h1>
        <p>Track and manage customer orders</p>
      </div>

      <div class="card">
        <!-- Filter Tabs -->
        <div class="tabs">
          <button class="tab-btn active" data-status="All">
            All <span id="tab-count-all" style="margin-left:4px;background:#E5E7EB;padding:1px 7px;border-radius:10px;font-size:11px"></span>
          </button>
          <button class="tab-btn" data-status="Pending">
            Pending <span id="tab-count-pending" style="margin-left:4px;background:#FEF9C3;padding:1px 7px;border-radius:10px;font-size:11px"></span>
          </button>
          <button class="tab-btn" data-status="Processing">
            Processing <span id="tab-count-processing" style="margin-left:4px;background:#DBEAFE;padding:1px 7px;border-radius:10px;font-size:11px"></span>
          </button>
          <button class="tab-btn" data-status="Delivered">
            Delivered <span id="tab-count-delivered" style="margin-left:4px;background:#DCFCE7;padding:1px 7px;border-radius:10px;font-size:11px"></span>
          </button>
          <button class="tab-btn" data-status="Cancelled">
            Cancelled <span id="tab-count-cancelled" style="margin-left:4px;background:#FEE2E2;padding:1px 7px;border-radius:10px;font-size:11px"></span>
          </button>
        </div>

        <!-- Table -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Order #</th>
                <th>Customer</th>
                <th>Phone</th>
                <th style="text-align:center">Items</th>
                <th>Total</th>
                <th>Payment</th>
                <th>Date</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="orders-tbody">
              <tr><td colspan="9"><div class="loading-state"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- ── Order Detail Modal ── -->
  <div class="modal-overlay" id="order-modal-overlay">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3>Order Details — <span id="od-order-num"></span></h3>
        <button class="modal-close" id="order-modal-close" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">

        <!-- Customer Info -->
        <div class="order-detail-section">
          <h4>Customer Information</h4>
          <div class="detail-grid">
            <div class="detail-item">
              <div class="detail-label">Customer Name</div>
              <div class="detail-value" id="od-customer" dir="auto"></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Phone Number</div>
              <div class="detail-value" id="od-phone"></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">City</div>
              <div class="detail-value" id="od-city" dir="auto"></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Address</div>
              <div class="detail-value" id="od-address" dir="auto"></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Payment Method</div>
              <div class="detail-value" id="od-payment"></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Order Date</div>
              <div class="detail-value" id="od-date"></div>
            </div>
          </div>
        </div>

        <!-- Items -->
        <div class="order-detail-section">
          <h4>Order Items</h4>
          <div class="table-container">
            <table class="items-table">
              <thead>
                <tr>
                  <th>Medicine</th>
                  <th style="text-align:center">Qty</th>
                  <th>Unit Price</th>
                  <th>Line Total</th>
                </tr>
              </thead>
              <tbody id="od-items-tbody"></tbody>
              <tfoot>
                <tr class="order-total-row">
                  <td colspan="3" style="text-align:right;padding-right:8px;">Total</td>
                  <td id="od-total"></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>

        <!-- Status Update -->
        <div class="order-detail-section" style="margin-bottom:0">
          <h4>Update Status</h4>
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
            <div id="od-current-status"></div>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            <select id="od-status-select" class="form-control" style="max-width:180px">
              <option value="Pending">Pending</option>
              <option value="Processing">Processing</option>
              <option value="Delivered">Delivered</option>
              <option value="Cancelled">Cancelled</option>
            </select>
            <button id="btn-update-status" class="btn btn-primary btn-sm">Update Status</button>
          </div>
          <p id="update-msg" style="margin-top:10px"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/orders.js"></script>
  <script>
    initAuthGuard(function () {
      renderSidebar();
      initOrders();
    });
  </script>
</body>
</html>
