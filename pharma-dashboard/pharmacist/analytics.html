<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — التحليلات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/sidebar.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="page-loading" id="loading-overlay"><div class="spinner"></div><p>جاري التحميل...</p></div>
  <div id="app-content" style="display:none">
    <div id="sidebar-container"></div>
    <button class="hamburger-btn" id="hamburger-btn"><span></span><span></span><span></span></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <main class="main-content">
      <div class="page-header"><h1>التحليلات والتقارير</h1><p>نظرة شاملة على أداء الصيدلية</p></div>

      <!-- Summary Stats -->
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon green">💰</div><div><div class="stat-label">إيرادات هذا الشهر</div><div class="stat-value" id="an-monthly">—</div></div></div>
        <div class="stat-card"><div class="stat-icon blue">🛒</div><div><div class="stat-label">إجمالي الطلبات</div><div class="stat-value" id="an-total-orders">—</div></div></div>
        <div class="stat-card"><div class="stat-icon green">💊</div><div><div class="stat-label">المنتجات المباعة</div><div class="stat-value" id="an-sold">—</div></div></div>
        <div class="stat-card"><div class="stat-icon yellow">📈</div><div><div class="stat-label">متوسط قيمة الطلب</div><div class="stat-value" id="an-avg">—</div></div></div>
      </div>

      <!-- Charts Row 1 -->
      <div class="charts-row">
        <div class="chart-card">
          <div class="section-header"><h3>الإيرادات الأسبوعية</h3></div>
          <canvas id="rev-chart" height="130"></canvas>
        </div>
        <div class="chart-card">
          <div class="section-header"><h3>الطلبات حسب الحالة</h3></div>
          <div style="max-width:200px;margin:0 auto">
            <canvas id="status-chart"></canvas>
          </div>
        </div>
      </div>

      <!-- Charts Row 2 -->
      <div class="charts-row" style="grid-template-columns: 1fr 2fr">
        <div class="chart-card">
          <div class="section-header"><h3>المبيعات حسب الفئة</h3></div>
          <canvas id="cat-chart"></canvas>
        </div>
        <div class="chart-card">
          <div class="section-header"><h3>أكثر المنتجات مبيعاً</h3></div>
          <canvas id="top-chart" height="160"></canvas>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/pharmacist/sidebar.js"></script>
  <script src="../js/pharmacist/analytics.js"></script>
  <script>initAuth('pharmacist', () => { renderPharmacistSidebar(); initAnalytics(); });</script>
</body>
</html>
