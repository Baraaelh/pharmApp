<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — الطلبات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/sidebar.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="page-loading" id="loading-overlay"><div class="spinner"></div><p>جاري التحميل...</p></div>
  <div id="app-content" style="display:none">
    <div id="sidebar-container"></div>
    <button class="hamburger-btn" id="hamburger-btn"><span></span><span></span><span></span></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <main class="main-content">
      <div class="page-header"><h1>الطلبات</h1><p>إدارة ومتابعة طلبات العملاء</p></div>

      <!-- Status distribution mini-chart -->
      <div style="display:flex;align-items:center;gap:20px;margin-bottom:16px">
        <div style="width:110px;height:110px;flex-shrink:0">
          <canvas id="orders-status-chart"></canvas>
        </div>
        <div id="orders-status-legend" style="font-size:12px;line-height:1.9;color:#374151"></div>
      </div>

      <div class="filter-tabs" id="status-tabs">
        <button class="filter-tab active" data-status="">الكل</button>
        <button class="filter-tab" data-status="pending">في الانتظار</button>
        <button class="filter-tab" data-status="confirmed">مؤكد</button>
        <button class="filter-tab" data-status="processing">قيد التحضير</button>
        <button class="filter-tab" data-status="ready">جاهز للاستلام</button>
        <button class="filter-tab" data-status="delivered">تم التسليم</button>
        <button class="filter-tab" data-status="cancelled">ملغي</button>
      </div>

      <div class="card">
        <div class="table-toolbar">
          <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="ord-search" class="form-control" placeholder="ابحث برقم الطلب أو اسم العميل...">
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>رقم الطلب</th>
                <th>العميل</th>
                <th>المنتجات</th>
                <th>الإجمالي</th>
                <th>الحالة</th>
                <th>التاريخ</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody id="ord-tbody"><tr><td colspan="7"><div class="loading-state"><div class="spinner"></div></div></td></tr></tbody>
          </table>
        </div>
        <div class="pagination">
          <span class="pagination-info" id="page-info"></span>
          <div class="pagination-btns">
            <button id="btn-prev" class="btn btn-sm btn-ghost" disabled>→ السابق</button>
            <button id="btn-next" class="btn btn-sm btn-ghost" disabled>التالي ←</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Order Detail Modal -->
  <div class="modal-overlay" id="order-modal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3>تفاصيل الطلب <span id="modal-order-id"></span></h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="order-detail-body"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">إغلاق</button>
        <div id="status-actions" style="display:flex;gap:8px"></div>
      </div>
    </div>
  </div>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/pharmacist/sidebar.js"></script>
  <script src="../js/pharmacist/orders.js"></script>
  <script>initAuth('pharmacist', () => { renderPharmacistSidebar(); initOrders(); });</script>
</body>
</html>
