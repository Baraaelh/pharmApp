<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — تسجيل صيدلية جديدة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" style="max-width:480px">
      <div class="auth-logo">
        <span class="logo-emoji">🏪</span>
        <h1>PharmacyLink</h1>
        <p>تسجيل صيدلية جديدة</p>
      </div>

      <div id="demo-note" style="display:none;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px;padding:10px 14px;font-size:12px;color:#166534;margin-bottom:16px;text-align:center">
        🟢 <strong>وضع العرض</strong> — سيتم إنشاء حساب تجريبي فوراً
      </div>

      <form id="reg-form" novalidate>
        <div class="form-group">
          <label>اسم الصيدلاني / المسؤول <span class="required">*</span></label>
          <input type="text" id="r-name" class="form-control" placeholder="م. خالد العمر" autocomplete="name" required>
        </div>
        <div class="form-group">
          <label>اسم الصيدلية <span class="required">*</span></label>
          <input type="text" id="r-pharm" class="form-control" placeholder="صيدلية الشفاء" required>
        </div>
        <div class="form-group">
          <label>المحافظة <span class="required">*</span></label>
          <select id="r-gov" class="form-control" required>
            <option value="">اختر المحافظة</option>
            <option>نابلس</option><option>رام الله</option><option>جنين</option>
            <option>الخليل</option><option>بيت لحم</option><option>طولكرم</option>
            <option>قلقيلية</option><option>أريحا</option><option>سلفيت</option><option>أخرى</option>
          </select>
        </div>
        <div class="form-group">
          <label>رقم الهاتف <span class="required">*</span></label>
          <input type="tel" id="r-phone" class="form-control" placeholder="0599XXXXXX" autocomplete="tel" required>
        </div>
        <div class="form-group">
          <label>البريد الإلكتروني <span class="required">*</span></label>
          <input type="email" id="r-email" class="form-control" placeholder="pharmacist@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label>كلمة المرور <span class="required">*</span></label>
          <input type="password" id="r-password" class="form-control" placeholder="8 أحرف على الأقل" autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label>تأكيد كلمة المرور <span class="required">*</span></label>
          <input type="password" id="r-confirm" class="form-control" placeholder="••••••••" autocomplete="new-password" required>
        </div>
        <button type="submit" id="reg-btn" class="btn btn-primary btn-full btn-lg">إنشاء الحساب</button>
        <p id="reg-error" class="error-msg" style="text-align:center;min-height:20px;margin-top:10px"></p>
      </form>

      <div class="auth-back" style="display:flex;flex-direction:column;gap:8px;text-align:center">
        <span>لديك حساب بالفعل؟ <a href="login.html" style="color:var(--primary);font-weight:600">تسجيل الدخول</a></span>
        <a href="../index.html" style="font-size:13px;color:var(--text-muted)">← العودة للرئيسية</a>
      </div>
    </div>
  </div>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    if (DEMO_MODE) document.getElementById('demo-note').style.display = 'block';

    document.getElementById('reg-form').addEventListener('submit', async e => {
      e.preventDefault();
      const name     = document.getElementById('r-name').value.trim();
      const pharmName = document.getElementById('r-pharm').value.trim();
      const gov      = document.getElementById('r-gov').value;
      const phone    = document.getElementById('r-phone').value.trim();
      const email    = document.getElementById('r-email').value.trim();
      const password = document.getElementById('r-password').value;
      const confirm  = document.getElementById('r-confirm').value;
      const errEl    = document.getElementById('reg-error');
      const btn      = document.getElementById('reg-btn');

      errEl.textContent = '';

      if (!name || !pharmName || !gov || !phone || !email || !password || !confirm) {
        errEl.textContent = 'يرجى ملء جميع الحقول.'; return;
      }
      if (password.length < 8) {
        errEl.textContent = 'كلمة المرور يجب أن تكون 8 أحرف على الأقل.'; return;
      }
      if (password !== confirm) {
        errEl.textContent = 'كلمتا المرور غير متطابقتين.'; return;
      }

      if (DEMO_MODE) {
        btn.disabled = true; btn.textContent = 'جاري الإنشاء...';
        await new Promise(r => setTimeout(r, 800));
        window.location.href = 'dashboard.html';
        return;
      }

      btn.disabled = true; btn.textContent = 'جاري الإنشاء...';
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await cred.user.sendEmailVerification();

        // Create pharmacy document
        const pharmacyRef = await db.collection('pharmacies').add({
          name: pharmName,
          governorate: gov,
          ownerId: cred.user.uid,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });

        // Create pharmacist user document
        await db.collection('users').doc(cred.user.uid).set({
          role: 'pharmacist',
          name, email, phone,
          pharmacyName: pharmName,
          pharmacyId: pharmacyRef.id,
          governorate: gov,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });

        // Redirect to email verification
        window.location.href = 'verify-email.html';
      } catch (err) {
        const map = {
          'auth/email-already-in-use': 'هذا البريد الإلكتروني مسجّل مسبقاً.',
          'auth/invalid-email':        'صيغة البريد الإلكتروني غير صحيحة.',
          'auth/weak-password':        'كلمة المرور ضعيفة جداً.',
          'auth/network-request-failed': 'تعذّر الاتصال بالإنترنت.',
        };
        errEl.textContent = map[err.code] || `حدث خطأ (${err.code}).`;
      } finally {
        btn.disabled = false; btn.textContent = 'إنشاء الحساب';
      }
    });
  </script>
</body>
</html>
