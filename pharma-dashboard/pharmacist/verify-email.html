<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — تأكيد البريد الإلكتروني</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" style="text-align:center">
      <div style="font-size:56px;margin-bottom:16px">📧</div>
      <h2 style="font-size:22px;font-weight:700;margin-bottom:8px">تحقق من بريدك الإلكتروني</h2>
      <p style="color:var(--text-muted);margin-bottom:6px">تم إرسال رابط التأكيد إلى</p>
      <p id="email-display" style="font-weight:600;margin-bottom:24px"></p>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">
        افتح بريدك الإلكتروني واضغط على رابط التأكيد ثم عد هنا.
      </p>
      <button id="btn-check" class="btn btn-primary btn-full" style="margin-bottom:10px">
        لقد قمت بالتأكيد ← الدخول للوحة التحكم
      </button>
      <button id="btn-resend" class="btn btn-ghost btn-full">إعادة إرسال البريد</button>
      <p id="verify-status" style="min-height:18px;margin-top:10px;font-size:13px"></p>
      <div style="margin-top:20px">
        <button onclick="logoutUser()" class="btn btn-sm btn-ghost">تسجيل الخروج</button>
      </div>
    </div>
  </div>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    const emailEl = document.getElementById('email-display');
    if (DEMO_MODE) {
      emailEl.textContent = mockPharmacistUser.email;
      document.getElementById('btn-check').addEventListener('click', () => {
        window.location.replace('dashboard.html');
      });
    } else {
      auth.onAuthStateChanged(user => {
        if (!user) { window.location.replace('login.html'); return; }
        if (user.emailVerified) { window.location.replace('dashboard.html'); return; }
        emailEl.textContent = user.email || '';
      });
      document.getElementById('btn-check').addEventListener('click', checkIfVerified);
      document.getElementById('btn-resend').addEventListener('click', () => {
        resendVerificationEmail('verify-status', document.getElementById('btn-resend'));
      });
    }
  </script>
</body>
</html>
