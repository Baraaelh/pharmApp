<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/sidebar.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

  <div class="page-loading" id="loading-overlay">
    <div class="spinner"></div>
    <p>Loading…</p>
  </div>

  <div class="app-layout" id="app-content" style="display:none">
    <div id="sidebar-container"></div>
    <button class="hamburger" id="hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content">
      <div class="page-header">
        <h1>Profile & Settings</h1>
        <p>Manage your pharmacy information and preferences</p>
      </div>

      <!-- ── Section 1: Pharmacy Info ── -->
      <div class="profile-section">
        <div class="profile-section-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Pharmacy Information
        </div>
        <form id="profile-form" novalidate>
          <div class="form-grid">
            <div class="form-group">
              <label for="p-name">Pharmacy Name (Arabic)</label>
              <input type="text" id="p-name" class="form-control" placeholder="اسم الصيدلية" dir="auto">
            </div>
            <div class="form-group">
              <label for="p-owner">Owner Name</label>
              <input type="text" id="p-owner" class="form-control" placeholder="Dr. Full Name" dir="auto">
            </div>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label for="p-phone">Phone Number</label>
              <input type="tel" id="p-phone" class="form-control" placeholder="059-XXX-XXXX">
            </div>
            <div class="form-group">
              <label for="p-email">Email Address</label>
              <input type="email" id="p-email" class="form-control" placeholder="pharmacy@example.com">
            </div>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label for="p-city">City</label>
              <input type="text" id="p-city" class="form-control" placeholder="e.g. Nablus" dir="auto">
            </div>
            <div class="form-group">
              <label for="p-license">License Number</label>
              <input type="text" id="p-license" class="form-control" placeholder="PL-XXXX-XXXX">
            </div>
          </div>
          <div class="form-group">
            <label for="p-address">Full Address</label>
            <input type="text" id="p-address" class="form-control" placeholder="Street, building, city" dir="auto">
          </div>
        </form>
        <div style="display:flex;align-items:center;gap:16px;margin-top:4px;flex-wrap:wrap">
          <button id="btn-save-info" class="btn btn-primary">Save Information</button>
          <p id="info-msg" style="margin:0"></p>
        </div>
      </div>

      <!-- ── Section 2: Working Hours ── -->
      <div class="profile-section">
        <div class="profile-section-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Working Hours
        </div>
        <div class="table-container">
          <table class="hours-table">
            <thead>
              <tr>
                <th style="text-align:left;padding:8px 6px;font-size:11px;color:var(--text-muted)">Day</th>
                <th style="text-align:left;padding:8px 6px;font-size:11px;color:var(--text-muted)">Opens</th>
                <th style="text-align:left;padding:8px 6px;font-size:11px;color:var(--text-muted)">Closes</th>
                <th style="text-align:right;padding:8px 6px;font-size:11px;color:var(--text-muted)" colspan="2">Status</th>
              </tr>
            </thead>
            <tbody id="hours-tbody">
              <tr><td colspan="5"><div class="loading-state"><div class="spinner spinner-sm" style="margin:auto"></div></div></td></tr>
            </tbody>
          </table>
        </div>
        <div style="display:flex;align-items:center;gap:16px;margin-top:16px;flex-wrap:wrap">
          <button id="btn-save-hours" class="btn btn-primary">Save Hours</button>
          <p id="hours-msg" style="margin:0"></p>
        </div>
      </div>

      <!-- ── Section 3: Change Password ── -->
      <div class="profile-section">
        <div class="profile-section-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Change Password
        </div>
        <form id="pw-form" novalidate>
          <div class="form-grid">
            <div class="form-group">
              <label for="pw-current">Current Password</label>
              <input type="password" id="pw-current" class="form-control" placeholder="Enter current password" autocomplete="current-password">
            </div>
            <div></div>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label for="pw-new">New Password</label>
              <input type="password" id="pw-new" class="form-control" placeholder="At least 6 characters" autocomplete="new-password">
            </div>
            <div class="form-group">
              <label for="pw-confirm">Confirm New Password</label>
              <input type="password" id="pw-confirm" class="form-control" placeholder="Repeat new password" autocomplete="new-password">
            </div>
          </div>
        </form>
        <div style="display:flex;align-items:center;gap:16px;margin-top:4px;flex-wrap:wrap">
          <button id="btn-change-pw" class="btn btn-primary">Update Password</button>
          <p id="pw-msg" style="margin:0"></p>
        </div>
      </div>

    </main>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/profile.js"></script>
  <script>
    initAuthGuard(function () {
      renderSidebar();
      initProfile();
    });
  </script>
</body>
</html>
