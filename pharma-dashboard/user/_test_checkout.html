<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Test Setup → Checkout</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
    .log { background: white; padding: 16px; border-radius: 8px; margin-top: 16px; font-size: 13px; line-height: 2; }
    .ok  { color: #1A7B4B; font-weight: 600; }
    .err { color: #ef4444; font-weight: 600; }
  </style>
</head>
<body>
  <h2>🧪 إعداد بيانات الاختبار...</h2>
  <div class="log" id="log"></div>

  <script>
    const log = document.getElementById('log');
    function line(msg, ok) {
      log.innerHTML += `<div class="${ok ? 'ok' : 'err'}">${ok ? '✅' : '❌'} ${msg}</div>`;
    }

    // 1. Seed a cart with two medicines from ph1
    const testCart = {
      pharmacyId:   'ph1',
      pharmacyName: 'صيدلية الشفاء',
      items: [
        { medicineId: 'pp1', nameAr: 'أموكسيسيلين', nameEn: 'Amoxicillin',  price: 18.50, qty: 2 },
        { medicineId: 'pp3', nameAr: 'باراسيتامول',  nameEn: 'Paracetamol', price: 7.50,  qty: 1 }
      ]
    };
    localStorage.setItem('pharma_cart', JSON.stringify(testCart));
    const readBack = JSON.parse(localStorage.getItem('pharma_cart'));
    line('تم حفظ السلة في localStorage — ' + readBack.items.length + ' منتج', true);

    // 2. GPS coords (Nablus)
    localStorage.setItem('pharma_user_lat', '32.2200');
    localStorage.setItem('pharma_user_lng', '35.2550');
    line('تم تعيين إحداثيات GPS (نابلس)', true);

    // 3. City
    localStorage.setItem('pharma_user_city', 'نابلس');
    line('تم تعيين المدينة: نابلس', true);

    // 4. Verify expected total
    const subtotal = testCart.items.reduce((s, i) => s + i.price * i.qty, 0);
    const total    = subtotal + 5;
    line(`الإجمالي المتوقع: ₪${subtotal.toFixed(2)} + ₪5.00 توصيل = ₪${total.toFixed(2)}`, true);
    line(`رمز USSD المتوقع: *724*${total.toFixed(2)}#`, true);

    // 5. Redirect after 2 seconds
    let countdown = 2;
    const timer = setInterval(() => {
      log.innerHTML += `<div style="color:#888">الانتقال للدفع خلال ${countdown--} ثانية...</div>`;
      if (countdown < 0) {
        clearInterval(timer);
        window.location.href = 'checkout.html';
      }
    }, 1000);
  </script>
</body>
</html>
