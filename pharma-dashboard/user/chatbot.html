<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — مساعد AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/chat.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="page-loading" id="loading-overlay"><div class="spinner"></div><p>جاري التحميل...</p></div>
  <div id="app-content" style="display:none">
    <div id="sidebar-container"></div>
    <button class="hamburger-btn" id="hamburger-btn"><span></span><span></span><span></span></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <main class="main-content" style="padding:0;display:flex;flex-direction:column;height:100vh">
      <div class="chatbot-header">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="bot-avatar">🤖</div>
          <div>
            <div style="font-weight:700">مساعد صيدلية AI</div>
            <div style="font-size:12px;color:var(--text-muted)">متاح دائماً للإجابة على استفساراتك الدوائية</div>
          </div>
        </div>
        <button id="btn-clear-history" class="btn btn-sm btn-ghost" title="مسح المحادثة">🗑️ مسح</button>
      </div>

      <div id="bot-messages" class="bot-messages-area"></div>

      <!-- Quick Suggestions -->
      <div id="suggestions" class="suggestions-row">
        <button class="suggestion-chip" onclick="sendSuggestion(this)">ما هو البنادول؟</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">أعراض الأموكسيسيلين</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">تفاعلات دوائية</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">جرعة الإيبوبروفين للأطفال</button>
      </div>

      <div class="chat-input-bar chatbot-input-bar">
        <input type="text" id="bot-input" class="chat-input" placeholder="اسأل عن أي دواء أو حالة صحية..." maxlength="500">
        <button id="bot-send" class="btn-send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </main>
  </div>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/openai.js"></script>
  <script src="../js/user/sidebar.js"></script>
  <script src="../js/user/chatbot.js"></script>
  <script>initAuth('user', () => { renderUserSidebar(); initChatbot(); });</script>
</body>
</html>
