<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — محادثاتي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/chat.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="page-loading" id="loading-overlay"><div class="spinner"></div><p>جاري التحميل...</p></div>
  <div id="app-content" style="display:none">
    <div id="sidebar-container"></div>
    <button class="hamburger-btn" id="hamburger-btn"><span></span><span></span><span></span></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <main class="main-content" style="padding:0">
      <div class="chat-container">
        <!-- Pharmacy List -->
        <div class="chat-sidebar">
          <div class="chat-sidebar-header"><h2>صيدلياتي</h2></div>
          <div id="pharmacy-list" class="conv-list"></div>
        </div>

        <!-- Message Panel -->
        <div class="chat-main">
          <div class="chat-main-empty" id="chat-empty">
            <div style="text-align:center;color:var(--text-muted)">
              <div style="font-size:48px;margin-bottom:12px">💬</div>
              <p>اختر صيدلية لبدء المحادثة</p>
            </div>
          </div>

          <div class="chat-panel-header" id="chat-header" style="display:none">
            <div class="chat-user-info">
              <div class="chat-avatar" id="chat-pharm-avatar">🏪</div>
              <div>
                <div class="chat-user-name" id="chat-pharm-name"></div>
                <div class="chat-user-sub" id="chat-pharm-sub"></div>
              </div>
            </div>
          </div>

          <div class="messages-area" id="messages-area" style="display:none"></div>

          <div class="chat-input-bar" id="chat-input-bar" style="display:none">
            <input type="text" id="msg-input" class="chat-input" placeholder="اكتب رسالتك..." maxlength="500">
            <button id="btn-send" class="btn-send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/user/sidebar.js"></script>
  <script src="../js/user/chats.js"></script>
  <script>initAuth('user', () => { renderUserSidebar(); initUserChats(); });</script>
</body>
</html>
