<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — أدوية جديدة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="page-loading" id="loading-overlay"><div class="spinner"></div><p>جاري التحميل...</p></div>
  <div id="app-content" style="display:none">
    <div id="sidebar-container"></div>
    <button class="hamburger-btn" id="hamburger-btn"><span></span><span></span><span></span></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content">
      <div class="page-header">
        <h1>🆕 أدوية وصلت حديثاً</h1>
        <p>آخر الأدوية التي أضافتها الصيدليات خلال الأسبوع الماضي</p>
      </div>

      <!-- Filters -->
      <div class="card" style="margin-bottom:18px">
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
          <select id="new-city-filter" class="form-control" style="width:auto;min-width:140px">
            <option value="">كل المدن</option>
            <option>نابلس</option>
            <option>رام الله</option>
            <option>جنين</option>
            <option>الخليل</option>
            <option>طولكرم</option>
            <option>قلقيلية</option>
            <option>أريحا</option>
            <option>بيت لحم</option>
            <option>طوباس</option>
          </select>

          <select id="new-sort" class="form-control" style="width:auto;min-width:140px">
            <option value="newest">الأحدث أولاً</option>
            <option value="cheapest">الأرخص أولاً</option>
          </select>
        </div>

        <!-- Category chips -->
        <div id="new-cat-chips" class="filter-tabs" style="margin-top:12px"></div>
      </div>

      <!-- Grid -->
      <div id="new-meds-grid" class="medicines-grid">
        <div class="skeleton" style="height:220px;border-radius:12px"></div>
        <div class="skeleton" style="height:220px;border-radius:12px"></div>
        <div class="skeleton" style="height:220px;border-radius:12px"></div>
        <div class="skeleton" style="height:220px;border-radius:12px"></div>
        <div class="skeleton" style="height:220px;border-radius:12px"></div>
        <div class="skeleton" style="height:220px;border-radius:12px"></div>
      </div>

      <!-- Pagination -->
      <div id="new-pagination" style="margin-top:20px"></div>
    </main>
  </div>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/user/sidebar.js"></script>
  <script src="../js/user/new-medicines.js"></script>
  <script>initAuth('user', () => { renderUserSidebar(); initNewMedicines(); });</script>
</body>
</html>
