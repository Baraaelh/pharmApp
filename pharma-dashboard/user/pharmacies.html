<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — الصيدليات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="page-loading" id="loading-overlay"><div class="spinner"></div><p>جاري التحميل...</p></div>
  <div id="app-content" style="display:none">
    <div id="sidebar-container"></div>
    <button class="hamburger-btn" id="hamburger-btn"><span></span><span></span><span></span></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content">
      <div class="page-header">
        <h1>🏪 الصيدليات</h1>
        <p id="pharmacies-subtitle">جميع المناطق</p>
      </div>

      <!-- Filter bar -->
      <div class="card" style="margin-bottom:18px">
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
          <div class="search-box" style="flex:1;min-width:180px">
            <span class="search-icon">🔍</span>
            <input type="text" id="pharm-search" class="form-control"
                   placeholder="ابحث عن صيدلية..." style="padding-right:38px">
          </div>

          <select id="city-filter" class="form-control" style="width:auto;min-width:140px">
            <option value="">كل المدن</option>
            <option>نابلس</option>
            <option>رام الله</option>
            <option>جنين</option>
            <option>الخليل</option>
            <option>طولكرم</option>
            <option>قلقيلية</option>
            <option>أريحا</option>
            <option>بيت لحم</option>
            <option>طوباس</option>
          </select>

          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="sort-btn filter-tab active" data-sort="nearest">📍 الأقرب</button>
            <button class="sort-btn filter-tab" data-sort="rating">⭐ الأعلى تقييماً</button>
            <button class="sort-btn filter-tab" data-sort="newest">🆕 الأحدث</button>
          </div>

          <button id="gps-btn" class="btn btn-outline btn-sm">📍 تحديث GPS</button>
        </div>

        <!-- Location preference row -->
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
          <span style="font-size:13px;color:var(--text-muted);flex-shrink:0">احسب المسافة من:</span>
          <button class="loc-pref-btn filter-tab active" data-pref="gps">📍 موقعي الحالي</button>
          <button class="loc-pref-btn filter-tab" data-pref="home">🏠 المنزل</button>
          <button class="loc-pref-btn filter-tab" data-pref="work">💼 العمل</button>
          <span id="loc-pref-label" style="font-size:12px;color:var(--text-muted);margin-right:auto"></span>
        </div>
      </div>

      <!-- Pharmacies list -->
      <div id="pharmacies-list">
        <!-- skeleton -->
        <div class="skeleton" style="height:90px;border-radius:12px;margin-bottom:12px"></div>
        <div class="skeleton" style="height:90px;border-radius:12px;margin-bottom:12px"></div>
        <div class="skeleton" style="height:90px;border-radius:12px;margin-bottom:12px"></div>
      </div>
    </main>
  </div>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/user/sidebar.js"></script>
  <script src="../js/user/pharmacies.js"></script>
  <script>initAuth('user', () => { renderUserSidebar(); initPharmacies(); });</script>
</body>
</html>
