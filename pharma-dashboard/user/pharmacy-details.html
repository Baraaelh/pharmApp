<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — تفاصيل الصيدلية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="page-loading" id="loading-overlay"><div class="spinner"></div><p>جاري التحميل...</p></div>
  <div id="app-content" style="display:none">
    <div id="sidebar-container"></div>
    <button class="hamburger-btn" id="hamburger-btn"><span></span><span></span><span></span></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content">
      <!-- Pharmacy header injected here -->
      <div id="pharmacy-header"></div>

      <!-- Medicines section -->
      <div class="card">
        <div class="section-header" style="margin-bottom:16px">
          <h2>💊 الأدوية المتوفرة</h2>
        </div>

        <!-- Search + category filter -->
        <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
          <div class="search-box" style="flex:1;min-width:180px">
            <span class="search-icon">🔍</span>
            <input type="text" id="prod-search" class="form-control"
                   placeholder="ابحث في أدوية هذه الصيدلية..." style="padding-right:38px">
          </div>
        </div>

        <div id="category-chips" class="filter-tabs" style="margin-bottom:16px"></div>

        <div id="products-grid" class="medicines-grid">
          <div class="skeleton" style="height:200px;border-radius:12px"></div>
          <div class="skeleton" style="height:200px;border-radius:12px"></div>
          <div class="skeleton" style="height:200px;border-radius:12px"></div>
          <div class="skeleton" style="height:200px;border-radius:12px"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Conflict modal: adding from different pharmacy -->
  <div class="modal-overlay" id="conflict-modal" onclick="if(event.target===this)this.classList.remove('active')">
    <div class="modal">
      <div class="modal-header">
        <h3>⚠️ تعارض في السلة</h3>
        <button class="modal-close" onclick="document.getElementById('conflict-modal').classList.remove('active')">✕</button>
      </div>
      <div class="modal-body">
        <p style="margin-bottom:8px">سلتك تحتوي حالياً على أدوية من <strong id="conflict-pharmacy-name"></strong>.</p>
        <p style="color:var(--text-muted);font-size:13px">لا يمكن إضافة أدوية من أكثر من صيدلية في نفس الطلب.</p>
        <p style="margin-top:8px">هل تريد مسح السلة والبدء من هذه الصيدلية؟</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="_cancelClearCart()">لا، احتفظ بالسلة الحالية</button>
        <button class="btn btn-danger" onclick="_confirmClearCart()">نعم، امسح السلة</button>
      </div>
    </div>
  </div>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/user/sidebar.js"></script>
  <script src="../js/user/pharmacy-details.js"></script>
  <script>initAuth('user', () => { renderUserSidebar(); initPharmacyDetails(); });</script>
</body>
</html>
