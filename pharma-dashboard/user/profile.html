<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — ملفي الشخصي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/sidebar.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="page-loading" id="loading-overlay"><div class="spinner"></div><p>جاري التحميل...</p></div>
  <div id="app-content" style="display:none">
    <div id="sidebar-container"></div>
    <button class="hamburger-btn" id="hamburger-btn"><span></span><span></span><span></span></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <main class="main-content">
      <div class="page-header"><h1>ملفي الشخصي</h1><p>إعدادات وبيانات الحساب</p></div>

      <div class="two-col">
        <!-- Personal Info -->
        <div class="card">
          <div class="section-header"><h2>المعلومات الشخصية</h2></div>
          <div class="profile-avatar-wrap">
            <div class="profile-avatar" id="user-avatar"></div>
            <div>
              <div id="user-name-display" style="font-size:18px;font-weight:700"></div>
              <div id="user-email-display" style="color:var(--text-muted);font-size:13px"></div>
            </div>
          </div>
          <form id="profile-form" novalidate style="margin-top:20px">
            <div class="form-group"><label>الاسم الكامل</label><input type="text" id="uf-name" class="form-control"></div>
            <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="uf-email" class="form-control" disabled style="opacity:.6"></div>
            <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="uf-phone" class="form-control" placeholder="05XXXXXXXX"></div>
            <p id="profile-msg" style="min-height:18px"></p>
            <button type="submit" class="btn btn-primary">حفظ التغييرات</button>
          </form>
        </div>

        <!-- Stats & Settings -->
        <div style="display:flex;flex-direction:column;gap:20px">
          <div class="card">
            <div class="section-header"><h2>إحصائيات الحساب</h2></div>
            <div class="user-stats">
              <div class="user-stat-item"><span class="usi-value" id="stat-orders">—</span><span class="usi-label">إجمالي الطلبات</span></div>
              <div class="user-stat-item"><span class="usi-value" id="stat-doses">—</span><span class="usi-label">الجرعات النشطة</span></div>
              <div class="user-stat-item"><span class="usi-value" id="stat-favs">—</span><span class="usi-label">المفضلة</span></div>
              <div class="user-stat-item"><span class="usi-value" id="stat-addrs">—</span><span class="usi-label">عناويني</span></div>
            </div>
          </div>

          <div class="card">
            <div class="section-header"><h2>تغيير كلمة المرور</h2></div>
            <form id="pw-form" novalidate>
              <div class="form-group"><label>كلمة المرور الحالية</label><input type="password" id="uf-cur-pw" class="form-control" placeholder="••••••••"></div>
              <div class="form-group"><label>كلمة المرور الجديدة</label><input type="password" id="uf-new-pw" class="form-control" placeholder="8 أحرف على الأقل"></div>
              <div class="form-group"><label>تأكيد كلمة المرور</label><input type="password" id="uf-conf-pw" class="form-control" placeholder="••••••••"></div>
              <p id="pw-msg" style="min-height:18px"></p>
              <button type="submit" class="btn btn-primary">تغيير كلمة المرور</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/user/sidebar.js"></script>
  <script src="../js/user/profile.js"></script>
  <script>initAuth('user', () => { renderUserSidebar(); initUserProfile(); });</script>
</body>
</html>
