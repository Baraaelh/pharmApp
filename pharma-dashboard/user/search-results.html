<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmacyLink — نتائج البحث</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="page-loading" id="loading-overlay"><div class="spinner"></div><p>جاري التحميل...</p></div>
  <div id="app-content" style="display:none">
    <div id="sidebar-container"></div>
    <button class="hamburger-btn" id="hamburger-btn"><span></span><span></span><span></span></button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content">
      <!-- Search bar at top -->
      <div class="home-search-bar" style="margin-bottom:16px">
        <input type="text" id="search-input-top" placeholder="ابحث عن دواء آخر..." />
        <button onclick="searchAgain()">🔍 بحث</button>
      </div>

      <div class="page-header" style="margin-bottom:14px">
        <h1 id="search-title">نتائج البحث</h1>
        <p id="results-count" style="color:var(--text-muted)"></p>
      </div>

      <!-- Sort + filter bar -->
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
        <span style="font-size:13px;color:var(--text-muted);font-weight:500">ترتيب:</span>
        <button class="sort-btn filter-tab active" data-sort="default">افتراضي</button>
        <button class="sort-btn filter-tab" data-sort="nearest">📍 الأقرب</button>
        <button class="sort-btn filter-tab" data-sort="cheapest">💚 الأرخص</button>
      </div>

      <!-- Top picks -->
      <div id="top-picks" class="top-picks-grid" style="display:none"></div>

      <!-- Results list -->
      <div id="results-list">
        <div class="skeleton" style="height:80px;border-radius:12px;margin-bottom:10px"></div>
        <div class="skeleton" style="height:80px;border-radius:12px;margin-bottom:10px"></div>
        <div class="skeleton" style="height:80px;border-radius:12px;margin-bottom:10px"></div>
      </div>
    </main>
  </div>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/user/sidebar.js"></script>
  <script src="../js/user/search-results.js"></script>
  <script>initAuth('user', () => { renderUserSidebar(); initSearchResults(); });</script>
</body>
</html>
